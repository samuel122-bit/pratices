<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Django Quiz</title>
	</head>
	<body>
		<h1 id="question">question here</h1>
		<button id="o1"></button>
		<button id="o2"></button>
		<button id="o3"></button>
		<button id="o4"></button>
		<script>
			let score = 0;
			let index = 0;
			let questions = [];
			fetch("/questions/")
				.then((response) => {
					response.json();
				})
				.then((data) => {
					questions = data;
					load();
				});
			function load() {
				let q = questions[index];
				question.innerText = q.text;
				o1.innerText = q.option1;
				o2.innerText = q.option2;
				o3.innerText = q.option3;
				o4.innerText = q.option4;
			}
		</script>
	</body>

<!DOCTYPE html>
<html>
	<head>
		<title>Django Quiz</title>
	</head>
	<body>
		<h2 id="question"></h2>

		<button onclick="check(1)" id="o1"></button>
		<button onclick="check(2)" id="o2"></button>
		<button onclick="check(3)" id="o3"></button>
		<button onclick="check(4)" id="o4"></button>

		<p id="result"></p>

		<script>
			let questions = [];
			let index = 0;
			let score = 0;

			fetch('/questions/')
			.then(res => res.json())
			.then(data => {
			    questions = data;
			    load();
			});

			function load(){
			    let q = questions[index];
			    question.innerText = q.text;
			    o1.innerText = q.option1;
			    o2.innerText = q.option2;
			    o3.innerText = q.option3;
			    o4.innerText = q.option4;
			}

			function check(ans){
			    if(ans === questions[index].correct){
			        score++;
			    }
			    index++;

			    if(index < questions.length){
			        load();
			    } else {
			        document.body.innerHTML = `
			            <h2>Score: ${score}</h2>
			            <button onclick="save()">Save Score</button>
			        `;
			    }
			}

			function save(){
			    let name = prompt("Enter your name");
			    fetch(`/save/?username=${name}&score=${score}`)
			    .then(() => alert("Score Saved"));
			}
			{% endcomment %}
		</script>
	</body>
</html>
